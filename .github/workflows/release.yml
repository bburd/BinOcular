name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            package_extension: .zip
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os: linux
            package_extension: .tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set package metadata
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $packageName = "BinOcular-$version-${{ matrix.target }}${{ matrix.package_extension }}"
          "VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_NAME=$packageName" >> $env:GITHUB_ENV

      - name: Build release binaries
        run: cargo build -p binocular-cli -p binocular-gui --release --target ${{ matrix.target }}

      - name: Package Windows artifacts
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package, dist
          Copy-Item "target\${{ matrix.target }}\release\binocular-cli.exe" package\
          Copy-Item "target\${{ matrix.target }}\release\binocular-gui.exe" package\
          Copy-Item README.md package\
          Copy-Item LICENSE package\
          Compress-Archive -Path package\* -DestinationPath "dist\$env:PACKAGE_NAME" -Force

      - name: Package Linux artifacts
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/binocular-cli" package/
          cp "target/${{ matrix.target }}/release/binocular-gui" package/
          cp README.md LICENSE package/
          tar -czf "dist/${PACKAGE_NAME}" -C package .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          merge-multiple: false

      - name: Collect release packages
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          mapfile -d '' packages < <(
            find release-downloads -type f \
              \( -name "BinOcular-${version}-*.zip" -o -name "BinOcular-${version}-*.tar.gz" \) \
              -print0 | sort -z
          )

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No release packages found for ${version}" >&2
            exit 1
          fi

          for package in "${packages[@]}"; do
            name="$(basename "$package")"
            destination="release-assets/$name"
            if [ -e "$destination" ]; then
              echo "Duplicate release package filename: $name" >&2
              exit 1
            fi
            cp "$package" "$destination"
          done

          ls -la release-assets

      - name: Generate release metadata
        run: |
          python scripts/build-release-manifest.py \
            --package-dir release-assets \
            --version "${GITHUB_REF_NAME}" \
            --git-commit "${GITHUB_SHA}" \
            --output-dir release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/BinOcular-${{ github.ref_name }}-*.zip
            release-assets/BinOcular-${{ github.ref_name }}-*.tar.gz
            release-assets/SHA256SUMS
            release-assets/manifest.json
          fail_on_unmatched_files: true
